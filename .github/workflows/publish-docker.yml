name: Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    # Only publish from a semver tag. The `release: published` trigger also
    # fires for data releases (kg-snapshots-*, paper*-kg-snapshots-*), whose
    # tags are not semver — docker/metadata-action's `type=semver` patterns
    # then match nothing, so those runs used to push a bare `latest` built
    # from whatever main happened to be, and never produced a version tag.
    # To publish by hand, dispatch this workflow with a vX.Y.Z tag as the ref.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/samyama-ai/samyama-graph
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Auth lets the first release pull the package while it's still private.
      # GHCR packages default to private on first publish — flip to public in
      # GHCR package settings after the first release to skip needing this.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # redis-tools (provides redis-cli) is not preinstalled on ubuntu-latest.
      - name: Install redis-tools
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      # Pin to the version just built. Pulling `:latest` here could smoke-test
      # a different image than the one this run produced.
      - name: Pull and start container
        run: |
          docker run -d --name samyama \
            -p 6379:6379 -p 8080:8080 \
            ghcr.io/samyama-ai/samyama-graph:${{ needs.build-and-push.outputs.version }}

      - name: Wait for healthy
        run: |
          for i in $(seq 1 20); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' samyama 2>/dev/null)
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "healthy" ] && exit 0
            sleep 3
          done
          docker logs samyama
          exit 1

      - name: Check HTTP status endpoint
        run: curl -sf http://localhost:8080/api/status

      - name: Run a Cypher query via RESP
        run: |
          redis-cli -p 6379 GRAPH.QUERY testdb \
            "CREATE (a:Person {name:'Alice'})-[:KNOWS]->(b:Person {name:'Bob'}) RETURN a.name"

      # Always dump container logs on failure so a failing curl/redis-cli
      # step is diagnosable — without this, only the healthy-wait failure
      # prints logs.
      - name: Dump container logs on failure
        if: failure()
        run: docker logs samyama

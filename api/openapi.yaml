openapi: 3.1.0
info:
  title: Samyama Graph Database API
  version: 0.6.0
  description: |
    HTTP API for the Samyama high-performance distributed graph database.
    Supports OpenCypher queries, graph status, and CRUD operations.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/query:
    post:
      operationId: executeQuery
      summary: Execute a Cypher query
      description: |
        Execute an OpenCypher query against the graph database.
        Supports both read (MATCH) and write (CREATE, SET, DELETE, MERGE) queries.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
            examples:
              matchAll:
                summary: Match all Person nodes
                value:
                  query: "MATCH (n:Person) RETURN n"
              matchWithFilter:
                summary: Match with WHERE filter
                value:
                  query: "MATCH (n:Person) WHERE n.age > 25 RETURN n.name, n.age"
              createNode:
                summary: Create a new node
                value:
                  query: 'CREATE (n:Person {name: "Alice", age: 30})'
              traversal:
                summary: Traverse relationships
                value:
                  query: "MATCH (a:Person)-[:KNOWS]->(b:Person) RETURN a.name, b.name"
      responses:
        '200':
          description: Query executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          description: Query error (parse error, execution error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/schema:
    get:
      operationId: getSchema
      summary: Get graph schema
      description: |
        Returns the full schema of the graph database including node types with
        property keys/types, edge types with source/target labels, indexes,
        constraints, and basic statistics.
      responses:
        '200':
          description: Graph schema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaResponse'

  /api/import/csv:
    post:
      operationId: importCsv
      summary: Import nodes from CSV
      description: |
        Upload a CSV file to create nodes. The first row is treated as column headers
        (property names). Each subsequent row creates one node with the specified label.
        Property types are auto-detected (integer → float → boolean → string).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - label
              properties:
                file:
                  type: string
                  description: CSV file content
                label:
                  type: string
                  description: Node label to assign to all created nodes
                id_column:
                  type: string
                  description: Column to use as node ID mapping (optional)
                delimiter:
                  type: string
                  description: "CSV delimiter character (default: ',')"
      responses:
        '200':
          description: Import successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsvImportResponse'
        '400':
          description: Import error (missing fields, parse error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/import/json:
    post:
      operationId: importJson
      summary: Import nodes from JSON
      description: |
        Create nodes from an array of JSON objects. Each object becomes one node
        with the specified label. Object keys become property names; values must be
        string, number, or boolean (other types are silently skipped).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JsonImportRequest'
            example:
              label: Person
              nodes:
                - name: Alice
                  age: 30
                - name: Bob
                  age: 25
      responses:
        '200':
          description: Import successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonImportResponse'
        '400':
          description: Import error (missing label, invalid data)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/status:
    get:
      operationId: getStatus
      summary: Get server status
      description: Returns the health status, version, and storage statistics of the database.
      responses:
        '200':
          description: Server status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
              example:
                status: healthy
                version: 0.6.0
                storage:
                  nodes: 2000
                  edges: 11000

components:
  schemas:
    QueryRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: An OpenCypher query string
          examples:
            - "MATCH (n:Person) RETURN n"

    QueryResponse:
      type: object
      properties:
        nodes:
          type: array
          description: Graph nodes referenced in the result (for visualization)
          items:
            $ref: '#/components/schemas/GraphNode'
        edges:
          type: array
          description: Graph edges referenced in the result (for visualization)
          items:
            $ref: '#/components/schemas/GraphEdge'
        columns:
          type: array
          description: Column names for the tabular result
          items:
            type: string
        records:
          type: array
          description: Tabular result rows, one array per record
          items:
            type: array
            items: {}

    GraphNode:
      type: object
      properties:
        id:
          type: string
          description: Node ID
        labels:
          type: array
          items:
            type: string
          description: Node labels
        properties:
          type: object
          additionalProperties: true
          description: Node properties

    GraphEdge:
      type: object
      properties:
        id:
          type: string
          description: Edge ID
        source:
          type: string
          description: Source node ID
        target:
          type: string
          description: Target node ID
        type:
          type: string
          description: Relationship type
        properties:
          type: object
          additionalProperties: true
          description: Edge properties

    StatusResponse:
      type: object
      properties:
        status:
          type: string
          description: Server health status
          examples:
            - healthy
        version:
          type: string
          description: Server version
          examples:
            - 0.6.0
        storage:
          type: object
          properties:
            nodes:
              type: integer
              description: Number of nodes in the graph
            edges:
              type: integer
              description: Number of edges in the graph

    SchemaResponse:
      type: object
      properties:
        node_types:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              count:
                type: integer
              properties:
                type: object
                additionalProperties:
                  type: string
                  description: "Property type: String, Integer, Float, Boolean, Vector, Unknown"
        edge_types:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              count:
                type: integer
              source_labels:
                type: array
                items:
                  type: string
              target_labels:
                type: array
                items:
                  type: string
              properties:
                type: object
                additionalProperties:
                  type: string
        indexes:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              property:
                type: string
              type:
                type: string
        constraints:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              property:
                type: string
              type:
                type: string
        statistics:
          type: object
          properties:
            total_nodes:
              type: integer
            total_edges:
              type: integer
            avg_out_degree:
              type: number

    JsonImportRequest:
      type: object
      required:
        - label
        - nodes
      properties:
        label:
          type: string
          description: Node label to assign to all created nodes
        nodes:
          type: array
          description: Array of JSON objects, each becoming a node
          items:
            type: object
            additionalProperties: true

    CsvImportResponse:
      type: object
      properties:
        status:
          type: string
          examples:
            - ok
        nodes_created:
          type: integer
        label:
          type: string
        columns:
          type: array
          items:
            type: string

    JsonImportResponse:
      type: object
      properties:
        status:
          type: string
          examples:
            - ok
        nodes_created:
          type: integer
        label:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
